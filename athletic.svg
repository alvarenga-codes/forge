<svg
            class="athlete-figure"
            viewBox="0 0 420 700"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            style="width: 80%; max-width: 380px; opacity: 0.9"
          >
            <!-- Glow effect -->
            <defs>
              <radialGradient id="glowGrad" cx="50%" cy="60%" r="50%">
                <stop offset="0%" stop-color="#C8FF00" stop-opacity="0.25" />
                <stop offset="100%" stop-color="#C8FF00" stop-opacity="0" />
              </radialGradient>
              <filter id="softGlow">
                <feGaussianBlur stdDeviation="8" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
              </filter>
              <filter id="strongGlow">
                <feGaussianBlur stdDeviation="4" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
              </filter>
            </defs>
            <!-- Background glow -->
            <ellipse cx="210" cy="450" rx="180" ry="260" fill="url(#glowGrad)" />
            <!-- Shadow/ground -->
            <ellipse cx="210" cy="685" rx="130" ry="14" fill="#C8FF00" opacity="0.08" />

            <!-- LEGS -->
            <!-- Left leg -->
            <path
              d="M185 480 L165 580 L155 680"
              stroke="#C8FF00"
              stroke-width="22"
              stroke-linecap="round"
              opacity="0.15"
              filter="url(#softGlow)"
            />
            <path
              d="M185 480 L165 580 L155 680"
              stroke="#C8FF00"
              stroke-width="8"
              stroke-linecap="round"
              opacity="0.6"
            />
            <path
              d="M185 480 L165 580 L155 680"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              opacity="0.4"
            />
            <!-- Right leg -->
            <path
              d="M235 480 L258 580 L268 680"
              stroke="#C8FF00"
              stroke-width="22"
              stroke-linecap="round"
              opacity="0.15"
              filter="url(#softGlow)"
            />
            <path
              d="M235 480 L258 580 L268 680"
              stroke="#C8FF00"
              stroke-width="8"
              stroke-linecap="round"
              opacity="0.6"
            />
            <path
              d="M235 480 L258 580 L268 680"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              opacity="0.4"
            />

            <!-- Feet -->
            <path
              d="M145 678 L165 676 L172 682"
              stroke="#C8FF00"
              stroke-width="8"
              stroke-linecap="round"
              opacity="0.6"
            />
            <path
              d="M258 678 L278 676 L285 682"
              stroke="#C8FF00"
              stroke-width="8"
              stroke-linecap="round"
              opacity="0.6"
            />

            <!-- TORSO -->
            <path
              d="M160 310 L155 480 L265 480 L260 310 Z"
              fill="#111"
              stroke="#333"
              stroke-width="1"
            />
            <!-- Chest highlight -->
            <path d="M180 330 L210 360 L240 330" stroke="#C8FF00" stroke-width="2" opacity="0.4" />
            <line
              x1="210"
              y1="330"
              x2="210"
              y2="450"
              stroke="#C8FF00"
              stroke-width="1.5"
              opacity="0.25"
            />
            <!-- Abs lines -->
            <line x1="192" y1="380" x2="228" y2="380" stroke="#333" stroke-width="1.5" />
            <line x1="188" y1="410" x2="232" y2="410" stroke="#333" stroke-width="1.5" />
            <line x1="186" y1="440" x2="234" y2="440" stroke="#333" stroke-width="1.5" />

            <!-- SHOULDERS -->
            <ellipse
              cx="148"
              cy="318"
              rx="26"
              ry="22"
              fill="#1a1a1a"
              stroke="#2a2a2a"
              stroke-width="1"
            />
            <ellipse
              cx="272"
              cy="318"
              rx="26"
              ry="22"
              fill="#1a1a1a"
              stroke="#2a2a2a"
              stroke-width="1"
            />
            <!-- Shoulder highlight -->
            <path
              d="M132 308 Q148 296 164 308"
              stroke="#C8FF00"
              stroke-width="2"
              opacity="0.5"
              fill="none"
            />
            <path
              d="M256 308 Q272 296 288 308"
              stroke="#C8FF00"
              stroke-width="2"
              opacity="0.5"
              fill="none"
            />

            <!-- ARMS -->
            <!-- Left arm -->
            <path
              d="M148 338 L118 430 L108 500"
              stroke="#C8FF00"
              stroke-width="22"
              stroke-linecap="round"
              opacity="0.1"
              filter="url(#softGlow)"
            />
            <path
              d="M148 338 L118 430 L108 500"
              stroke="#1e1e1e"
              stroke-width="20"
              stroke-linecap="round"
            />
            <path
              d="M148 338 L118 430 L108 500"
              stroke="#C8FF00"
              stroke-width="6"
              stroke-linecap="round"
              opacity="0.5"
            />
            <path
              d="M148 338 L118 430 L108 500"
              stroke="white"
              stroke-width="1.5"
              stroke-linecap="round"
              opacity="0.2"
            />
            <!-- Bicep definition -->
            <path
              d="M135 370 Q122 390 125 410"
              stroke="#C8FF00"
              stroke-width="1.5"
              opacity="0.3"
              fill="none"
            />

            <!-- Right arm -->
            <path
              d="M272 338 L302 430 L312 500"
              stroke="#C8FF00"
              stroke-width="22"
              stroke-linecap="round"
              opacity="0.1"
              filter="url(#softGlow)"
            />
            <path
              d="M272 338 L302 430 L312 500"
              stroke="#1e1e1e"
              stroke-width="20"
              stroke-linecap="round"
            />
            <path
              d="M272 338 L302 430 L312 500"
              stroke="#C8FF00"
              stroke-width="6"
              stroke-linecap="round"
              opacity="0.5"
            />
            <path
              d="M272 338 L302 430 L312 500"
              stroke="white"
              stroke-width="1.5"
              stroke-linecap="round"
              opacity="0.2"
            />
            <!-- Bicep definition -->
            <path
              d="M285 370 Q298 390 295 410"
              stroke="#C8FF00"
              stroke-width="1.5"
              opacity="0.3"
              fill="none"
            />

            <!-- Hands/Fists -->
            <circle
              cx="107"
              cy="505"
              r="12"
              fill="#1a1a1a"
              stroke="#C8FF00"
              stroke-width="2"
              opacity="0.7"
            />
            <circle
              cx="313"
              cy="505"
              r="12"
              fill="#1a1a1a"
              stroke="#C8FF00"
              stroke-width="2"
              opacity="0.7"
            />

            <!-- NECK -->
            <rect
              x="197"
              y="250"
              width="26"
              height="60"
              rx="6"
              fill="#1a1a1a"
              stroke="#222"
              stroke-width="1"
            />

            <!-- HEAD -->
            <ellipse
              cx="210"
              cy="210"
              rx="60"
              ry="70"
              fill="#1a1a1a"
              stroke="#2a2a2a"
              stroke-width="1.5"
            />
            <!-- Face subtle features -->
            <path
              d="M188 205 Q194 200 200 205"
              stroke="#C8FF00"
              stroke-width="1.5"
              opacity="0.3"
              fill="none"
            />
            <path
              d="M220 205 Q226 200 232 205"
              stroke="#C8FF00"
              stroke-width="1.5"
              opacity="0.3"
              fill="none"
            />
            <path
              d="M200 230 Q210 238 220 230"
              stroke="#C8FF00"
              stroke-width="1.5"
              opacity="0.25"
              fill="none"
            />
            <!-- Jawline -->
            <path
              d="M165 230 Q180 258 210 264 Q240 258 255 230"
              stroke="#333"
              stroke-width="2"
              fill="none"
            />
            <!-- Hair top highlight -->
            <path
              d="M158 168 Q210 148 262 168"
              stroke="#C8FF00"
              stroke-width="3"
              opacity="0.2"
              fill="none"
            />

            <!-- NEON ACCENT LINES -->
            <line
              x1="210"
              y1="100"
              x2="210"
              y2="140"
              stroke="#C8FF00"
              stroke-width="1"
              opacity="0.4"
              stroke-dasharray="4,6"
            />
            <!-- Energy particles -->
            <circle cx="100" cy="300" r="3" fill="#C8FF00" opacity="0.5">
              <animate
                attributeName="opacity"
                values="0.5;0;0.5"
                dur="2.4s"
                repeatCount="indefinite"
              />
              <animate
                attributeName="cy"
                values="300;280;300"
                dur="2.4s"
                repeatCount="indefinite"
              />
            </circle>
            <circle cx="330" cy="260" r="2" fill="#C8FF00" opacity="0.4">
              <animate
                attributeName="opacity"
                values="0.4;0;0.4"
                dur="1.8s"
                repeatCount="indefinite"
              />
              <animate
                attributeName="cy"
                values="260;240;260"
                dur="1.8s"
                repeatCount="indefinite"
              />
            </circle>
            <circle cx="80" cy="450" r="2.5" fill="#C8FF00" opacity="0.35">
              <animate
                attributeName="opacity"
                values="0.35;0;0.35"
                dur="3.2s"
                repeatCount="indefinite"
              />
            </circle>
            <circle cx="340" cy="420" r="2" fill="#FF4500" opacity="0.5">
              <animate
                attributeName="opacity"
                values="0.5;0;0.5"
                dur="2s"
                repeatCount="indefinite"
              />
            </circle>
            <!-- Circuit-like decoration lines -->
            <path
              d="M60 350 L90 350 L90 380 L120 380"
              stroke="#C8FF00"
              stroke-width="1"
              opacity="0.2"
              fill="none"
            />
            <path
              d="M360 350 L330 350 L330 380 L300 380"
              stroke="#C8FF00"
              stroke-width="1"
              opacity="0.2"
              fill="none"
            />
          </svg>